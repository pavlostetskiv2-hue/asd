<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Casual Style Logs</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #121212;
            color: #e0e0e0;
            text-align: center; 
            margin: 0; 
            padding: 20px; 
        }
        h1 { 
            color: #ffffff;
            margin-bottom: 10px; 
            font-weight: 300;
        }
        .status-bar { 
            font-size: 0.8em; 
            color: #999; 
            margin-bottom: 15px; 
        }
        .container { 
            background: #1e1e1e;
            max-width: 500px; 
            margin: 0 auto; 
            padding: 20px; 
            border-radius: 8px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }
        .search-group { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 20px; 
        }
        input { 
            flex-grow: 1; 
            padding: 12px; 
            border: 1px solid #444; 
            background-color: #252525; 
            color: #ffffff; 
            border-radius: 4px; 
            outline: none; 
            transition: border-color 0.2s;
        }
        input:focus {
            border-color: #5cb85c;
        }
        button { 
            padding: 10px 20px; 
            background: #449d44; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            transition: 0.2s; 
            font-weight: bold;
        }
        button:hover { 
            background: #5cb85c; 
        }
        #results { 
            text-align: left; 
        }
        .log-entry { 
            border-bottom: 1px solid #333;
            padding: 12px 0; 
            animation: fadeIn 0.3s ease-in; 
        }
        .log-entry:last-child { 
            border-bottom: none; 
        }
        .player-name { 
            font-weight: bold; 
            color: #81d4fa;
        }
        .timestamp { 
            font-size: 0.85em; 
            color: #aaa;
            display: block; 
            margin-top: 5px; 
        }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(-5px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        .error-box { 
            color: #ef9a9a; 
            border: 1px solid #c62828; 
            padding: 10px; 
            border-radius: 4px; 
            background: #2c1616; 
        }
        .warning-box { 
            color: #ffe082; 
            border: 1px solid #f9a825; 
            padding: 10px; 
            border-radius: 4px; 
            background: #2d2919; 
        }
    </style>
</head>
<body>
    <h1>Логи</h1>
    <div id="last-update" class="status-bar">Ожидание...</div>
    <div class="container">
        <div class="search-group">
            <input type="text" id="search" placeholder="Ник игрока..." onkeypress="if(event.key === 'Enter') loadLogs()">
            <button onclick="loadLogs()">Найти</button>
        </div>
        <div id="results"></div>
    </div>
    <script>
        async function loadLogs() {
            const query = document.getElementById('search').value.trim().toLowerCase();
            const resDiv = document.getElementById('results');
            const statusDiv = document.getElementById('last-update');
            try {
                const response = await fetch('logs.json?t=' + new Date().getTime());
                if (!response.ok) {
                    throw new Error(response.status === 404 ? "logs.json нету!" : "Ошибка сервера: " + response.status);
                }
                const logs = await response.json();
                statusDiv.innerText = "Обновлено: " + new Date().toLocaleTimeString();

                if (!Array.isArray(logs) || logs.length === 0) {
                    resDiv.innerHTML = "<div class='warning-box'>Логи пустые [ ].</div>";
                    return;
                }
                const filtered = logs.filter(item => 
                    item.player && item.player.toLowerCase().includes(query)
                ).reverse();
                
                if (filtered.length > 0) {
                    resDiv.innerHTML = `<p style="color: #888; font-size: 0.8em; margin-bottom: 15px;">Найдено ${filtered.length} из ${logs.length} записей:</p>` + 
                        filtered.map(i => {
                            const actionText = i.action || i.message || "No action";
                            return `
                                <div class="log-entry">
                                    <span class="player-name">${i.player}</span>: ${actionText}
                                    <span class="timestamp">🕒 ${i.timestamp}</span>
                                </div>`;
                        }).join('');
                } else {
                    resDiv.innerHTML = `<div class='warning-box'>Ник <b>${query}</b> не найден.</div>`;
                }
            } catch (e) {
                resDiv.innerHTML = `<div class='error-box'><b>Ошибка:</b><br>${e.message}</div>`;
            }
        }
        loadLogs();
        setInterval(loadLogs, 10000);
    </script>
</body>
</html>
